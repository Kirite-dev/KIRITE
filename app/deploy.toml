# ---------------------------------------------------------------------------- #
# Governance (mainnet)
# ---------------------------------------------------------------------------- #

[mainnet_beta.governance]
# Timelock duration for governance proposals (48 hours)
proposal_timelock_seconds = 172800

# Required signers for multi-sig governance actions
required_signers = 3

# Maximum number of governance signers
max_signers = 7

# Grace period after timelock before proposal expires (24 hours)
execution_grace_period_seconds = 86400

# ---------------------------------------------------------------------------- #
# Operational Limits
# ---------------------------------------------------------------------------- #

[mainnet_beta.limits]
# Maximum single deposit (anti-whale). 0 = no limit.
max_single_deposit = 0

# Rate limit: max deposits per wallet per hour
max_deposits_per_hour = 10

# Minimum time between deposits from same wallet (seconds)
deposit_cooldown_seconds = 60

# Maximum pending withdrawals per pool
max_pending_withdrawals = 1000
