# ============================================================================ #
# KIRITE Protocol — Deployment Configuration
# ============================================================================ #
#
# This file contains cluster-specific deployment parameters.
# Referenced by deploy.sh, migrate.ts, and the TypeScript SDK.
#

[global]
program_name = "kirite"
protocol_version = "0.1.0"

# Protocol fee: 0.1% (10 basis points)
fee_bps = 10

# Burn ratio: 50% of collected fees are burned
burn_ratio_bps = 5000

# ---------------------------------------------------------------------------- #
# Devnet
# ---------------------------------------------------------------------------- #

[devnet]
program_id = "57yf6giJCEnjhFt7sLA3sN5GLkaZvaAfWchdvcrkcUCH"
rpc_url = "https://api.devnet.solana.com"
ws_url = "wss://api.devnet.solana.com/"
commitment = "confirmed"

[devnet.fee]
fee_bps = 10
burn_ratio_bps = 5000

[devnet.mints]
SOL  = "So11111111111111111111111111111111111111112"
USDC = "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU"  # devnet USDC
USDT = "EJwZgeZrdC8TXTQbQBoL6bfuAnFUQYtNjCraGmmX1hEP"  # devnet USDT placeholder

[devnet.shield_pools]

  [devnet.shield_pools.SOL_01]
  mint = "So11111111111111111111111111111111111111112"
  denomination = 100_000_000          # 0.1 SOL (lamports)
  timelock_seconds = 300              # 5 minutes
  min_anonymity_set = 2               # low threshold for testing

  [devnet.shield_pools.SOL_1]
  mint = "So11111111111111111111111111111111111111112"
  denomination = 1_000_000_000        # 1 SOL
  timelock_seconds = 300
  min_anonymity_set = 2

  [devnet.shield_pools.USDC_100]
  mint = "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU"
  denomination = 100_000_000          # 100 USDC (6 decimals)
  timelock_seconds = 300
  min_anonymity_set = 2

  [devnet.shield_pools.USDT_100]
  mint = "EJwZgeZrdC8TXTQbQBoL6bfuAnFUQYtNjCraGmmX1hEP"
  denomination = 100_000_000          # 100 USDT (6 decimals)
  timelock_seconds = 300
  min_anonymity_set = 2

